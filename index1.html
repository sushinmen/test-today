<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 날씨 | Weather Today</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-sunny: linear-gradient(135deg, #ff7e5f, #feb47b);
            --bg-cloudy: linear-gradient(135deg, #617ca6, #9ab7d3);
            --bg-rainy: linear-gradient(135deg, #203a43, #2c5364);
            --bg-snowy: linear-gradient(135deg, #83a4d4, #b6fbff);
            
            --card-bg: rgba(255, 255, 255, 0.15);
            --card-border: rgba(255, 255, 255, 0.25);
            --text-color: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-sunny);
            transition: background 1s ease;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* Ambient animated backgrounds */
        .weather-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Glassmorphism Card */
        .weather-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            z-index: 10;
            transform: translateY(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
        }

        /* Location and Date */
        .location {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .location i {
            animation: bounce 2s infinite;
        }

        .date {
            font-size: 0.95rem;
            color: var(--text-sub);
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* Weather Icon */
        .weather-icon-container {
            position: relative;
            height: 140px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .weather-icon {
            font-size: 5rem;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
            animation: float 4s ease-in-out infinite;
        }

        /* Temperature */
        .temp-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .temp {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
        }

        .temp-unit {
            font-size: 2rem;
            font-weight: 400;
            margin-top: 5px;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        .temp-unit:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Weather Description */
        .description {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            text-transform: capitalize;
        }

        /* Details list */
        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 25px;
            margin-top: 10px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 10px;
            border-radius: 20px;
            transition: background 0.3s ease;
        }

        .detail-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .detail-label {
            font-size: 0.8rem;
            color: var(--text-sub);
            font-weight: 400;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Selector / Controller */
        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .control-btn.active {
            background: #ffffff;
            color: #333333;
            border-color: #ffffff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        /* Animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Rain and Snow Effects */
        .drop {
            position: absolute;
            background: linear-gradient(transparent, rgba(255,255,255,0.4));
            width: 1px;
            height: 80px;
            animation: fall 1.2s linear infinite;
        }

        .flake {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: snowfall 3s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-120px); }
            100% { transform: translateY(100vh); }
        }

        @keyframes snowfall {
            0% {
                transform: translateY(-10px) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(100vh) translateX(50px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="weather-effect" id="weather-effect"></div>

    <div class="weather-card">
        <div class="location">
            <i class="fa-solid fa-location-dot"></i>
            <span id="loc-text">서울, 대한민국</span>
        </div>
        <div class="date" id="date-text">2026년 5월 26일 화요일</div>

        <div class="weather-icon-container">
            <i class="fa-solid fa-sun weather-icon" id="weather-icon" style="color: #ffca28;"></i>
        </div>

        <div class="temp-container">
            <span class="temp" id="temp-val">24</span>
            <span class="temp-unit" id="temp-unit">°C</span>
        </div>

        <div class="description" id="weather-desc">맑음</div>

        <div class="weather-details">
            <div class="detail-item">
                <span class="detail-label">습도</span>
                <span class="detail-value" id="humidity-val">45%</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">풍속</span>
                <span class="detail-value" id="wind-val">2.5 m/s</span>
            </div>
        </div>

        <!-- Controls to simulate different weather styles -->
        <div class="controls">
            <button class="control-btn active" onclick="setWeather('sunny')">맑음</button>
            <button class="control-btn" onclick="setWeather('cloudy')">흐림</button>
            <button class="control-btn" onclick="setWeather('rainy')">비</button>
            <button class="control-btn" onclick="setWeather('snowy')">눈</button>
        </div>
    </div>

    <script>
        // Update current date automatically
        function updateDate() {
            const dateElement = document.getElementById('date-text');
            const now = new Date();
            
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                weekday: 'long' 
            };
            
            // Format in Korean
            dateElement.textContent = now.toLocaleDateString('ko-KR', options);
        }

        // Weather database
        const weatherData = {
            sunny: {
                tempC: 24,
                tempF: 75,
                desc: '맑고 화창함',
                humidity: '40%',
                wind: '2.1 m/s',
                icon: 'fa-sun',
                iconColor: '#ffca28',
                bodyBg: 'var(--bg-sunny)'
            },
            cloudy: {
                tempC: 19,
                tempF: 66,
                desc: '구름 많음',
                humidity: '65%',
                wind: '3.4 m/s',
                icon: 'fa-cloud',
                iconColor: '#eceff1',
                bodyBg: 'var(--bg-cloudy)'
            },
            rainy: {
                tempC: 16,
                tempF: 61,
                desc: '비 내림',
                humidity: '85%',
                wind: '4.8 m/s',
                icon: 'fa-cloud-showers-heavy',
                iconColor: '#90a4ae',
                bodyBg: 'var(--bg-rainy)'
            },
            snowy: {
                tempC: -2,
                tempF: 28,
                desc: '눈 내림',
                humidity: '75%',
                wind: '1.9 m/s',
                icon: 'fa-snowflake',
                iconColor: '#e0f7fa',
                bodyBg: 'var(--bg-snowy)'
            }
        };

        let currentWeather = 'sunny';
        let currentUnit = 'C';

        function setWeather(type) {
            currentWeather = type;
            
            // Update active button states
            const buttons = document.querySelectorAll('.control-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Find button by onclick content
            const clickedBtn = Array.from(buttons).find(btn => btn.getAttribute('onclick').includes(type));
            if (clickedBtn) clickedBtn.classList.add('active');

            // Get data
            const data = weatherData[type];

            // Apply body background
            document.body.style.background = data.bodyBg;

            // Apply icon changes
            const iconEl = document.getElementById('weather-icon');
            iconEl.className = `fa-solid ${data.icon} weather-icon`;
            iconEl.style.color = data.iconColor;

            // Apply values
            updateTemperatureDisplay();
            document.getElementById('weather-desc').textContent = data.desc;
            document.getElementById('humidity-val').textContent = data.humidity;
            document.getElementById('wind-val').textContent = data.wind;

            // Generate ambient effects
            generateEffects(type);
        }

        function updateTemperatureDisplay() {
            const tempValEl = document.getElementById('temp-val');
            const data = weatherData[currentWeather];
            if (currentUnit === 'C') {
                tempValEl.textContent = data.tempC;
            } else {
                tempValEl.textContent = data.tempF;
            }
        }

        // Toggle Celsius / Fahrenheit
        document.getElementById('temp-unit').addEventListener('click', () => {
            currentUnit = currentUnit === 'C' ? 'F' : 'C';
            document.getElementById('temp-unit').textContent = `°${currentUnit}`;
            updateTemperatureDisplay();
        });

        // Ambient Effects Generator
        function generateEffects(type) {
            const container = document.getElementById('weather-effect');
            container.innerHTML = ''; // Clear previous effects

            if (type === 'rainy') {
                const dropCount = 40;
                for (let i = 0; i < dropCount; i++) {
                    const drop = document.createElement('div');
                    drop.classList.add('drop');
                    drop.style.left = `${Math.random() * 100}vw`;
                    drop.style.top = `${Math.random() * -100}px`;
                    drop.style.animationDelay = `${Math.random() * 1.5}s`;
                    drop.style.opacity = Math.random();
                    container.appendChild(drop);
                }
            } else if (type === 'snowy') {
                const flakeCount = 30;
                for (let i = 0; i < flakeCount; i++) {
                    const flake = document.createElement('div');
                    flake.classList.add('flake');
                    const size = Math.random() * 5 + 3;
                    flake.style.width = `${size}px`;
                    flake.style.height = `${size}px`;
                    flake.style.left = `${Math.random() * 100}vw`;
                    flake.style.top = `${Math.random() * -20}px`;
                    flake.style.animationDelay = `${Math.random() * 3}s`;
                    flake.style.animationDuration = `${Math.random() * 2 + 3}s`;
                    flake.style.opacity = Math.random();
                    container.appendChild(flake);
                }
            }
        }

        // Initialize
        updateDate();
        generateEffects('sunny');
    </script>
</body>
</html>
